<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Auto Unfollow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #25f4ee;
    }

    .lang-switcher {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      padding: 3px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .lang-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 16px;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .lang-btn:hover {
      color: #fff;
    }

    .lang-btn.active {
      background: #25f4ee;
      color: #1a1a2e;
    }

    .options {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .option-label {
      display: flex;
      align-items: center;
      padding: 6px 0;
      cursor: pointer;
    }

    .option-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #25f4ee;
      cursor: pointer;
      margin-right: 10px;
    }

    .option-label .label-text {
      font-size: 14px;
      color: #e0e0e0;
      flex: 1;
    }

    .option-label .badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(37, 244, 238, 0.15);
      color: #25f4ee;
      text-transform: uppercase;
    }

    .option-label .badge.mutual {
      background: rgba(255, 193, 7, 0.15);
      color: #ffc107;
    }

    #status {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      min-height: 42px;
      margin-bottom: 8px;
      border-left: 3px solid #25f4ee;
      display: flex;
      align-items: center;
    }

    #status.error {
      border-left-color: #f44336;
      background: rgba(244, 67, 54, 0.1);
    }

    #status.success {
      border-left-color: #4CAF50;
      background: rgba(76, 175, 80, 0.1);
    }

    #status .status-icon {
      margin-right: 8px;
    }

    #details {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      min-height: 22px;
      text-align: center;
    }

    #unfollowBtn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #25f4ee 0%, #00d4cc 100%);
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    #unfollowBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37, 244, 238, 0.35);
    }

    #unfollowBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: #444;
      color: #888;
    }

    .progress-container {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #25f4ee, #00d4cc);
      width: 0%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .stats-row {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stats-row.active {
      display: flex;
    }

    .stat-item {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 8px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stat-item .stat-number {
      font-size: 18px;
      font-weight: 700;
      color: #25f4ee;
      display: block;
    }

    .stat-item.friend .stat-number {
      color: #ffc107;
    }

    .stat-item .stat-label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #444;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 12px;
    }

    .footer a {
      color: #25f4ee;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 Auto Unfollow</h1>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
  </div>

  <div class="options">
    <label class="option-label">
      <input type="checkbox" id="unfollowFollowing" checked>
      <span class="label-text">Unfollow Following</span>
      <span class="badge">Recommended</span>
    </label>
    <label class="option-label">
      <input type="checkbox" id="unfollowFriend">
      <span class="label-text">Unfollow Friends</span>
      <span class="badge mutual">Mutual</span>
    </label>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-item">
      <span class="stat-number" id="statFollowing">0</span>
      <span class="stat-label">Following</span>
    </div>
    <div class="stat-item friend">
      <span class="stat-number" id="statFriend">0</span>
      <span class="stat-label">Friends</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="statTotal">0</span>
      <span class="stat-label">Total</span>
    </div>
  </div>

  <div id="status">
    <span class="status-icon">⏳</span>
    <span>Ready to start</span>
  </div>
  <div id="details"></div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <button id="unfollowBtn">Start Auto Unfollow</button>

  <div class="footer">
    <span>v2.0</span>
    <span>•</span>
    <span>⚠️ 2s delay</span>
    <span>•</span>
    <a id="resetBtn">Reset</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
